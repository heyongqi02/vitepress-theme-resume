name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Vite Plus
        uses: heyongqi02/workflows/setup-vp@vp
        with:
          fetch-all: true
          cache: false

      - name: Build theme package
        run: vp pack
        env:
          CI: true

      - name: Build demo site
        run: vp run demo_build
        env:
          CI: true

      - name: Run tests
        run: vp test

      - name: Verify API snapshots are up to date
        run: git diff --exit-code __snapshots__/tsnapi/
