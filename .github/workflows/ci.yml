name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build theme package
        run: pnpm run build
        env:
          CI: true

      - name: Build demo site
        run: pnpm run demo:build
        env:
          CI: true

      - name: Run tests
        run: pnpm test

      - name: Verify API snapshots are up to date
        run: git diff --exit-code __snapshots__/tsnapi/
